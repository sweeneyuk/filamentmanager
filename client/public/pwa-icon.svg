<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1a2e"/>
  <rect width="512" height="512" rx="100" fill="url(#grad1)" opacity="0.8"/>
  
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="filament" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Spool Geometry -->
  <g transform="translate(106, 86)">
    <!-- Back Flange -->
    <path d="M50 0 L250 0 C277.6 0 300 22.4 300 50 L300 340 C300 367.6 277.6 390 250 390 L50 390 C22.4 390 0 367.6 0 340 L0 50 C0 22.4 22.4 0 50 0 Z" fill="#2d2d44" />
    
    <!-- Filament wound on the core -->
    <rect x="40" y="60" width="220" height="270" rx="15" fill="url(#filament)" />
    <!-- Filament lines -->
    <line x1="40" y1="100" x2="260" y2="100" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    <line x1="40" y1="140" x2="260" y2="140" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    <line x1="40" y1="180" x2="260" y2="180" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    <line x1="40" y1="220" x2="260" y2="220" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    <line x1="40" y1="260" x2="260" y2="260" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    
    <!-- Front Flange -->
    <path d="M50 0 L250 0 C277.6 0 300 22.4 300 50 L300 340 C300 367.6 277.6 390 250 390 L50 390 C22.4 390 0 367.6 0 340 L0 50 C0 22.4 22.4 0 50 0 Z" fill="#3a3a5a" opacity="0.95" />
    
    <!-- Inner Core Hole -->
    <circle cx="150" cy="195" r="45" fill="#1a1a2e" />
    <circle cx="150" cy="195" r="30" fill="#0f0f1c" />
    
    <!-- Flange Holes -->
    <circle cx="150" cy="70" r="15" fill="#1a1a2e" />
    <circle cx="150" cy="320" r="15" fill="#1a1a2e" />
    <circle cx="60" cy="195" r="15" fill="#1a1a2e" />
    <circle cx="240" cy="195" r="15" fill="#1a1a2e" />
  </g>
</svg>
